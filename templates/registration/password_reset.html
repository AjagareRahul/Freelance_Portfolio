{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset - {{ name|default:"Ajagare Rahul" }}{% endblock %}

{% block extra_css %}
<style>
    .auth-hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
    }

    .auth-hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: 
            radial-gradient(ellipse 600px 600px at 20% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 60%),
            radial-gradient(ellipse 500px 500px at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        pointer-events: none;
    }

    .auth-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        max-width: 440px;
        width: 100%;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .auth-card .auth-logo {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(139, 92, 246, 0.2));
        border: 1px solid rgba(56, 189, 248, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
    }

    .auth-card .auth-logo i {
        font-size: 2rem;
        color: #38bdf8;
    }

    .form-floating-custom label {
        color: #64748b;
        padding-left: 1rem;
    }

    .form-control-custom {
        padding: 0.85rem 1rem;
        background: rgba(15, 23, 42, 0.6);
        border: 1.5px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: #e2e8f0;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        font-family: inherit;
    }

    .form-control-custom:focus {
        background: rgba(15, 23, 42, 0.8);
        border-color: #38bdf8;
        color: #e2e8f0;
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.08);
        outline: none;
    }

    .form-control-custom::placeholder {
        color: #475569;
    }

    .form-control-custom:-webkit-autofill,
    .form-control-custom:-webkit-autofill:hover,
    .form-control-custom:-webkit-autofill:focus {
        -webkit-text-fill-color: #e2e8f0;
        -webkit-box-shadow: 0 0 0px 1000px rgba(15, 23, 42, 0.8) inset;
        transition: background-color 5000s ease-in-out 0s;
        border-color: #38bdf8;
    }

    .form-floating-custom > .form-control-custom:not(:placeholder-shown) ~ label,
    .form-floating-custom > .form-control:focus ~ label,
    .form-floating-custom > .form-control:not(:placeholder-shown) ~ label {
        transform: scale(0.85) translateY(-0.5rem) translateX(0.15rem);
        color: #38bdf8;
    }

    .btn-auth {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #020617;
        font-weight: 700;
        padding: 0.85rem 2rem;
        border-radius: 50px;
        border: none;
        font-size: 1rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
    }

    .btn-auth:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        color: #020617;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-hero">
    <div class="container mx-auto px-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card shadow-lg p-4 p-lg-5">
                    <div class="auth-logo">
                        <i class="fas fa-key"></i>
                    </div>

                    <div class="text-center mb-4">
                        <h3 class="text-white font-bold">Reset Password</h3>
                        <p class="text-slate-400 text-sm">Enter your email to receive reset instructions</p>
                    </div>

                    <form method="POST" class="needs-validation" novalidate>
                        {% csrf_token %}
                        <div class="form-floating-custom mb-4">
                            <input type="email" name="email" class="form-control form-control-custom" id="id_email" placeholder="your@email.com" required>
                            <label for="id_email">Email Address</label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-auth">
                                <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{% url 'portfolio:login' %}" class="text-slate-400 hover:text-cyan-400 transition-colors text-sm text-decoration-none">
                            <i class="fas fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
