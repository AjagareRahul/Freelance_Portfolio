{% load static %}
{% load portfolio_tags %}

<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNavbar">
    <div class="container">
        <a class="navbar-brand" href="{% url 'portfolio:home' %}">
            <span class="brand-text">Rahul<span class="text-warning">.</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'portfolio:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/about/' in request.path %}active{% endif %}" href="{% url 'portfolio:about' %}">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/skills/' in request.path %}active{% endif %}" href="{% url 'portfolio:skills' %}">Skills</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/projects/' in request.path %}active{% endif %}" href="{% url 'portfolio:projects' %}">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/experience/' in request.path or '/about/' in request.path %}active{% endif %}" href="{% url 'portfolio:about' %}">Experience</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/testimonials/' in request.path %}active{% endif %}" href="{% url 'portfolio:home' %}#testimonials">Testimonials</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/contact/' in request.path %}active{% endif %}" href="{% url 'portfolio:contact' %}">Contact</a>
                </li>
            </ul>
            <a href="{% url 'portfolio:contact' %}" class="btn-hire-me ms-lg-auto">
                Hire Me <i class="fas fa-paper-plane ms-2"></i>
            </a>
        </div>
    </div>
</nav>
