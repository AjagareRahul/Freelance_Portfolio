{% load static %}
{% load portfolio_tags %}

<nav class="navbar navbar-expand-lg fixed-top z-50 transition-all duration-500" id="mainNavbar">
    <div class="container mx-auto px-4">
        <!-- Navbar backdrop blur (glassmorphism) -->
        <div class="absolute inset-0 bg-dark-950/70 backdrop-blur-3xl backdrop-saturate-150 border-b border-white/5"></div>
        
        <a class="navbar-brand relative z-10" href="{% url 'portfolio:home' %}">
            <span class="brand-text text-lg font-bold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                &lt;{{ name|default:"Rahul" }} /&gt;
            </span>
        </a>
        
        <button class="navbar-toggler relative z-10 flex flex-col gap-1.5 p-2 group" 
                type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="block w-6 h-0.5 bg-white/80 rounded-full transition-all duration-300 group-[.active]:rotate-45 group-[.active]:translate-y-2"></span>
            <span class="block w-6 h-0.5 bg-white/80 rounded-full transition-all duration-300 group-[.active]:opacity-0"></span>
            <span class="block w-6 h-0.5 bg-white/80 rounded-full transition-all duration-300 group-[.active]:-rotate-45 group-[.active]:-translate-y-2"></span>
        </button>
        
        <div class="collapse navbar-collapse relative z-10" id="navbarNav">
            <ul class="navbar-nav ms-auto flex items-center gap-2">
                <li class="nav-item">
                    <a class="nav-link text-white/80 hover:text-cyan-400 px-4 py-2 rounded-lg transition-all duration-300 hover:bg-white/5 text-sm font-medium {% if request.path == '/' %}active-link{% endif %}" 
                       href="{% url 'portfolio:home' %}">
                        <i class="fas fa-home me-1 d-lg-none"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white/80 hover:text-cyan-400 px-4 py-2 rounded-lg transition-all duration-300 hover:bg-white/5 text-sm font-medium {% if '/about/' in request.path %}active-link{% endif %}" 
                       href="{% url 'portfolio:about' %}">
                        <i class="fas fa-user me-1 d-lg-none"></i> About
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white/80 hover:text-cyan-400 px-4 py-2 rounded-lg transition-all duration-300 hover:bg-white/5 text-sm font-medium {% if '/skills/' in request.path %}active-link{% endif %}" 
                       href="{% url 'portfolio:skills' %}">
                        <i class="fas fa-code me-1 d-lg-none"></i> Skills
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white/80 hover:text-cyan-400 px-4 py-2 rounded-lg transition-all duration-300 hover:bg-white/5 text-sm font-medium {% if '/projects/' in request.path %}active-link{% endif %}" 
                       href="{% url 'portfolio:projects' %}">
                        <i class="fas fa-briefcase me-1 d-lg-none"></i> Projects
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white/80 hover:text-cyan-400 px-4 py-2 rounded-lg transition-all duration-300 hover:bg-white/5 text-sm font-medium {% if '/contact/' in request.path %}active-link{% endif %}" 
                       href="{% url 'portfolio:contact' %}">
                        <i class="fas fa-envelope me-1 d-lg-none"></i> Contact
                    </a>
                </li>
                
                {% if user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-white/80 hover:text-cyan-400 px-4 py-2 rounded-lg transition-all duration-300 hover:bg-white/5 text-sm font-medium cursor-pointer" 
                       href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-circle me-1"></i> {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end animate-dropdown bg-dark-800/95 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl p-1 mt-2" 
                        aria-labelledby="userDropdown">
                        <li>
                            <a class="dropdown-item text-white/80 hover:text-cyan-400 hover:bg-white/5 rounded-lg px-4 py-2.5 text-sm transition-all duration-200" 
                               href="{% url 'portfolio:dashboard' %}">
                                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item text-white/80 hover:text-cyan-400 hover:bg-white/5 rounded-lg px-4 py-2.5 text-sm transition-all duration-200" 
                               href="{% url 'portfolio:profile' %}">
                                <i class="fas fa-user me-2"></i>Profile
                            </a>
                        </li>
                        <li><hr class="dropdown-divider border-white/10 my-1"></li>
                        <li>
                            <a class="dropdown-item text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg px-4 py-2.5 text-sm transition-all duration-200" 
                               href="{% url 'portfolio:logout' %}">
                                <i class="fas fa-sign-out-alt me-2"></i>Logout
                            </a>
                        </li>
                    </ul>
                </li>
                {% else %}
                <li class="nav-item ms-1">
                    <a class="nav-link btn-nav-login text-sm font-semibold px-5 py-2 rounded-full transition-all duration-300" 
                       href="{% url 'portfolio:login' %}">
                        <i class="fas fa-sign-in-alt me-1"></i> Login
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<style>
    /* Active link underline indicator */
    .active-link {
        color: #38bdf8 !important;
        text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }
    
    .active-link::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 2px;
        background: linear-gradient(90deg, #38bdf8, #0ea5e9);
        border-radius: 2px;
    }
    
    /* Glassmorphism active state for navbar */
    #mainNavbar.scrolled {
        background: rgba(2, 6, 23, 0.85) !important;
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border-bottom: 1px solid rgba(56, 189, 248, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    
    .btn-nav-login {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(14, 165, 233, 0.15));
        border: 1px solid rgba(56, 189, 248, 0.3);
        color: #38bdf8 !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-nav-login:hover {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.3), rgba(14, 165, 233, 0.3));
        border-color: #38bdf8;
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2);
        color: #fff !important;
    }
    
    /* Dropdown animation */
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }
    
    .animate-dropdown {
        animation: slideDown 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Navbar link hover glow effect */
    .nav-link {
        position: relative;
    }
    
    .nav-link::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: inherit;
        opacity: 0;
        transition: opacity 0.3s ease;
        background: radial-gradient(circle at center, rgba(56, 189, 248, 0.05), transparent 70%);
    }
    
    .nav-link:hover::before {
        opacity: 1;
    }
</style>
