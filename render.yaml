services:
  - type: web
    name: django-portfolio
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py makemigrations --noinput && python manage.py collectstatic --noinput && python manage.py migrate --noinput --run-syncdb
    startCommand: gunicorn rahulportfolio.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio_db
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        value: dfgp33gvs
      - key: CLOUDINARY_API_KEY
        value: 756721668416317
      - key: CLOUDINARY_API_SECRET
        value: Axj6mr5CUZVmRO8l-lKx-7-y9zs

  - type: pserv
    name: portfolio_db
    env: postgresql
    plan: free
    databaseName: portfolio
    user: portfolio_user


